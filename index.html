<!DOCTYPE html>
<html>
<head>
    <style>

        .buttom1{

            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 900;
            height:  500;

        }


    </style>
<title>Page Title</title>
</head>
<body>




<button id = "A" type="button" class = "buttom1">A</button>

<button id = "W" type="button" class = "buttom1">W</button>

<button id = "S" type="button" class = "buttom1">S</button>

<button id = "D" type="button" class = "buttom1">D</button>


<!-- Ініціалізація брокера   -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
    
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

  client.on('connect', () => {
      console.log('Підключено до MQTT брокера!');
  });

    function sendSignalLeftward() {
      
      if(marker_a == true){

            client.publish('ukraine/esp32/Wi-Fi_module', 'leftward_go');
            console.log("Сигнал їхати наліво надіслано в хмару");

        }else if(marker_a == false){

            client.publish('ukraine/esp32/Wi-Fi_module', 'leftward_stop');
            console.log("Сигнал зупинитися наліво надіслано в хмару");

        }else{

            console.log("Щось пішло не так в sendSignalLeftward");

        }
    }

    function sendSignalForward() {
      
      if(marker_w == true){

            client.publish('ukraine/esp32/Wi-Fi_module', 'forward_go');
            console.log("Сигнал їхати в прямо надіслано в хмару");

        }else if(marker_w == false){

            client.publish('ukraine/esp32/Wi-Fi_module', 'forward_stop');
            console.log("Сигнал зупинитися прямо надіслано в хмару");

        }else{

            console.log("Щось пішло не так в sendSignalForward");

        }

    }

    function sendSignalBackward() {
      
      if(marker_s == true){

            client.publish('ukraine/esp32/Wi-Fi_module', 'backward_go');
            console.log("Сигнал їхати назад надіслано в хмару");

        }else if(marker_s == false){

            client.publish('ukraine/esp32/Wi-Fi_module', 'backward_stop');
            console.log("Сигнал зупинитися назад надіслано в хмару");

        }else{

            console.log("Щось пішло не так в sendSignalBackward");

        }
    }

    function sendSignalRightward() {
      
        if(marker_d == true){

            client.publish('ukraine/esp32/Wi-Fi_module', 'rightward_go');
            console.log("Сигнал їхати в право надіслано в хмару");

        }else if(marker_d == false){

            client.publish('ukraine/esp32/Wi-Fi_module', 'rightward_stop');
            console.log("Сигнал зупинитися в право надіслано в хмару");

        }else{

            console.log("Щось пішло не так в sendSignalRightward");

        }

    }


    const button_a = document.getElementById("A");
    let marker_a = false;

    button_a.addEventListener("click", () => sendSignalLeftward(true));

    document.addEventListener("keydown", function(event){
        
    if (event.code !== "KeyA") return;

    if (marker_a) return;

        marker_a = true;
        event.preventDefault();
        button_w.style.background = "#ddd";
        sendSignalLeftward(marker_a); 
        console.log("Кнопку затиснули!");

    });
    
    document.addEventListener("keyup", function(event){
    
    if (event.code !== "KeyA") return;

        marker_a = false;
        event.preventDefault();
        button_w.style.background = "#FFFFFF";
        sendSignalLeftward(marker_a); 
        console.log("Кнопку відпустили!");


    });

    const button_w = document.getElementById("W");
    let marker_w = false;

    button_w.addEventListener("click", () => sendSignalForward(true));

    document.addEventListener("keydown", function(event){
        
    if (event.code !== "KeyW") return;

    if (marker_w) return;

        marker_w = true;
        event.preventDefault();
        button_w.style.background = "#ddd";
        sendSignalForward(marker_w); 
        console.log("Кнопку затиснули!");

    });
    
    document.addEventListener("keyup", function(event){
    
    if (event.code !== "KeyW") return;

        marker_w = false;
        event.preventDefault();
        button_w.style.background = "#FFFFFF";
        sendSignalForward(marker_w); 
        console.log("Кнопку відпустили!");


    });

    const button_s = document.getElementById("S");
    let marker_s = false;

    button_s.addEventListener("click", () => sendSignalBackward(true));

    document.addEventListener("keydown", function(event){
        
    if (event.code !== "KeyS") return;

    if (marker_s) return;

        marker_s = true;
        event.preventDefault();
        button_s.style.background = "#ddd";
        sendSignalBackward(marker_s); 
        console.log("Кнопку затиснули!");

    });
    
    document.addEventListener("keyup", function(event){
    
    if (event.code !== "KeyS") return;

        marker_s = false;
        event.preventDefault();
        button_s.style.background = "#FFFFFF";
        sendSignalBackward(marker_s); 
        console.log("Кнопку відпустили!");


    });


    const button_d = document.getElementById("D");
    let marker_d = false;

    button_d.addEventListener("click", () => sendSignalRightward(true));

    document.addEventListener("keydown", function(event){
        
    if (event.code !== "KeyD") return;

    if (marker_d) return;

        marker_d = true;
        event.preventDefault();
        button_d.style.background = "#ddd";
        sendSignalRightward(marker_d); 
        console.log("Кнопку затиснули!");

    });
    
    document.addEventListener("keyup", function(event){
    
    if (event.code !== "KeyD") return;

        marker_d = false;
        event.preventDefault();
        button_d.style.background = "#FFFFFF";
        sendSignalRightward(marker_d); 
        console.log("Кнопку відпустили!");


    });

          
    

   

</script>

</body>
</html>
