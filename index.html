<!DOCTYPE html>
<html>
<head>
    <style>

        .buttom1{

            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 900;
            height:  500;

        }


    </style>

    <style>
  .btn-responsive {
    font-size: calc(0.8rem + 0.5vw);
    padding: calc(0.3rem + 0.3vw) calc(0.6rem + 0.6vw);
    white-space: nowrap;
  }
</style>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<title>Robot diraction</title>
</head>
<body>


<!-- Bottom AWSD -->


<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  
  <div class="ratio ratio-1x1 w-80 w-sm-60 w-md-40" style="max-width: 400px; max-height: 400px;">
    <div class="position-relative">
      
      <button id = "S" class="btn btn-primary btn-responsive position-absolute top-0 start-50 translate-middle-x mb-3">
        S
      </button>

      <button id = "A" class="btn btn-primary btn-responsive position-absolute top-50 start-0 translate-middle-y ">
        A
      </button>

      <button id = "W" class="btn btn-success btn-responsive position-absolute top-100 start-100 translate-middle fw-bold mb-3">
        W
      </button>

      <button id = "D" class="btn btn-primary btn-responsive position-absolute top-50 end-0 translate-middle-y">
        D
      </button>

    </div>
  </div>

</div>




<!-- Ініціалізація брокера   -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>

const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

  client.on('connect', () => {
      console.log('Підключено до MQTT брокера!');
  });

</script>

<script>
    //marker initialization
    let marker_a = false;
    let marker_w = false;
    let marker_s = false;
    let marker_d = false;

    //buttom initialization
    const button_a = document.getElementById("A");
    const button_w = document.getElementById("W");
    const button_s = document.getElementById("S");
    const button_d = document.getElementById("D");
    

    //direction checker
    function sendSignal() {
      if(marker_w && marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward_left');
        console.log("Сигнал <forward_left> надіслано в хмару");

      }else if(marker_w && marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward_right');
        console.log("Сигнал <forward_right> надіслано в хмару");

      }else if(marker_s && marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward_left');
        console.log("Сигнал <backward_left> надіслано в хмару");

      }else if(marker_s && marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward_right');
        console.log("Сигнал <backward_right> надіслано в хмару");

      }else if(marker_w){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward');
        console.log("Сигнал <forward> надіслано в хмару");

      }else if(marker_s){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward');
        console.log("Сигнал <backward> надіслано в хмару");

      }else if(marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'left');
        console.log("Сигнал <left> надіслано в хмару");

      }else if(marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'right');
        console.log("Сигнал <right> надіслано в хмару");

      }else if(marker_w && marker_s){

        client.publish('ukraine/esp32/Wi-Fi_module', 'all_stop');
        console.log("Конфлікт <forward> і <backward> надіслано в хмару");

      }else if(marker_a && marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'all_stop');
        console.log("Конфлікт <left> і <right> надіслано в хмару");

      }else{

        client.publish('ukraine/esp32/Wi-Fi_module', 'all_stop');
        console.log("Сигнал <all_stop> надіслано в хмару");

      }
      

    }

    //Keydown checker    
    document.addEventListener("keydown", function(event) {
        let changed = false; 

        if(event.code === "KeyW" && !marker_w){
            marker_w = true;
            if(button_w) button_w.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyS" && !marker_s){
            marker_s = true;
            if(button_s) button_s.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyA" && !marker_a){
            marker_a = true;
            if(button_a) button_a.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyD" && !marker_d){
            marker_d = true;
            if(button_d) button_d.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(changed){

            sendSignal();

        }

        
    });

    //Keyup checker
    document.addEventListener("keyup", function(event) {
        let changed = false; 

        if(event.code === "KeyW"){
            marker_w = false;
            if(button_w) button_w.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyS"){
            marker_s = false;
            if(button_s) button_s.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyA"){
            marker_a = false;
            if(button_a) button_a.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyD"){
            marker_d = false;
            if(button_d) button_d.style.background = "#FFFFFF";
            changed = true;
        }

        if(changed){

            sendSignal();

        }


    });

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
