<!DOCTYPE html>
<html>
<head>
    <style>

        .buttom1{

            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 900;
            height:  500;

        }


    </style>
<title>Page Title</title>
</head>
<body>


<!-- Bottom AWSD -->
<button id = "A" type="button" class = "buttom1">A</button>
<button id = "W" type="button" class = "buttom1">W</button>
<button id = "S" type="button" class = "buttom1">S</button>
<button id = "D" type="button" class = "buttom1">D</button>


<!-- Ініціалізація брокера   -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>

const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

  client.on('connect', () => {
      console.log('Підключено до MQTT брокера!');
  });

</script>

<script>
    //marker initialization
    let marker_a = false;
    let marker_w = false;
    let marker_s = false;
    let marker_d = false;

    //buttom initialization
    const button_a = document.getElementById("A");
    const button_w = document.getElementById("W");
    const button_s = document.getElementById("S");
    const button_d = document.getElementById("D");
    

    //leftward_go/leftward_stop checker
    function sendSignal() {
      if(marker_w && marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward_left');
        console.log("Сигнал <forward_left> надіслано в хмару");

      }else if(marker_w && marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward_right');
        console.log("Сигнал <forward_right> надіслано в хмару");

      }else if(marker_s && marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward_left');
        console.log("Сигнал <backward_left> надіслано в хмару");

      }else if(marker_s && marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward_right');
        console.log("Сигнал <backward_right> надіслано в хмару");

      }else if(marker_w){

        client.publish('ukraine/esp32/Wi-Fi_module', 'forward');
        console.log("Сигнал <forward> надіслано в хмару");

      }else if(marker_s){

        client.publish('ukraine/esp32/Wi-Fi_module', 'backward');
        console.log("Сигнал <backward> надіслано в хмару");

      }else if(marker_a){

        client.publish('ukraine/esp32/Wi-Fi_module', 'left');
        console.log("Сигнал <left> надіслано в хмару");

      }else if(marker_d){

        client.publish('ukraine/esp32/Wi-Fi_module', 'right');
        console.log("Сигнал <right> надіслано в хмару");

      }else{

        client.publish('ukraine/esp32/Wi-Fi_module', 'all_stop');
        console.log("Сигнал <all_stop> надіслано в хмару");

      }
      

    }

    //Keydown checker    
    document.addEventListener("keydown", function(event) {
        let changed = false; 

        if(event.code === "KeyW" && !marker_w){
            marker_w = true;
            if(button_w) button_w.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyS" && !marker_s){
            marker_s = true;
            if(button_s) button_s.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyA" && !marker_a){
            marker_a = true;
            if(button_a) button_a.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(event.code === "KeyD" && !marker_d){
            marker_d = true;
            if(button_d) button_d.style.background = "#ddd";
            event.preventDefault();
            changed = true;
        }

        if(changed){

            sendSignal();

        }

        
    });

    //Keyup checker
    document.addEventListener("keyup", function(event) {
        let changed = false; 

        if(event.code === "KeyW"){
            marker_w = false;
            if(button_w) button_w.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyS"){
            marker_s = false;
            if(button_s) button_s.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyA"){
            marker_a = false;
            if(button_a) button_a.style.background = "#FFFFFF";
            changed = true;
        }

        if(event.code === "KeyD"){
            marker_d = false;
            if(button_d) button_d.style.background = "#FFFFFF";
            changed = true;
        }

        if(changed){

            sendSignal();

        }


    });

          
    

   

</script>

</body>
</html>
