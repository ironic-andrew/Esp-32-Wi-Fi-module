<!DOCTYPE html>
<html>
<head>
    <style>

        .buttom1{

            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 900;
            height:  500;

        }


    </style>
<title>Page Title</title>
</head>
<body>




<button id = "A" type="button" class = "buttom1">A</button>

<button id = "W" type="button" class = "buttom1">W</button>

<button id = "S" type="button" class = "buttom1">S</button>

<button id = "D" type="button" class = "buttom1">D</button>


<!-- Ініціалізація брокера   -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
    
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

  client.on('connect', () => {
      console.log('Підключено до MQTT брокера!');
  });

    function sendSignalLeftward() {
      
      client.publish('ukraine/esp32/Wi-Fi_module', 'leftward');
      console.log("Сигнал надіслано в хмару");
    }

    function sendSignalForward() {
      
      client.publish('ukraine/esp32/Wi-Fi_module', 'forward');
      console.log("Сигнал надіслано в хмару");
    }

    function sendSignalBackward() {
      
      client.publish('ukraine/esp32/Wi-Fi_module', 'backward');
      console.log("Сигнал надіслано в хмару");
    }

    function sendSignalRightward() {
      
      client.publish('ukraine/esp32/Wi-Fi_module', 'rightward');
      console.log("Сигнал надіслано в хмару");
    }


    const button_a = document.getElementById("A");

    button_a.addEventListener("click", sendSignalLeftward);

    document.addEventListener("keydown", function(event){
        if (event.repeat) return;

        if(event.key == "A" || event.key == "a"){
            event.preventDefault();
            button_a.style.background = "#ddd";
            sendSignalLeftward();

        }
    });

    const button_w = document.getElementById("W");

    button_w.addEventListener("click", sendSignalForward);

    document.addEventListener("keydown", function(event){
        if (event.repeat) return;

        if(event.key == "W" || event.key == "w"){
            event.preventDefault();
            button_w.style.background = "#ddd";
            sendSignalForward();

        }
    });

    const button_s = document.getElementById("S");

    button_s.addEventListener("click", sendSignalBackward);

    document.addEventListener("keydown", function(event){
        if (event.repeat) return;

        if(event.key == "S" || event.key == "s"){
            event.preventDefault();
            button_s.style.background = "#ddd";
            sendSignalBackward();

        }
    });


    const button_d = document.getElementById("D");

    button_d.addEventListener("click", sendSignalRightward);

    document.addEventListener("keydown", function(event){
        if (event.repeat) return;

        if(event.key == "D" || event.key == "d"){
            event.preventDefault();
            button_d.style.background = "#ddd";
            sendSignalRightward();

        }
    });

</script>

</body>
</html>
