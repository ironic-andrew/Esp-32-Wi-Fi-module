<!DOCTYPE html>
<html>
<head>
    <style>

        .buttom1{

            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 900;
            height:  500;

        }


    </style>
<title>Page Title</title>
</head>
<body>




<button id = "A" type="button" class = "buttom1">A</button>

<button id = "W" type="button" class = "buttom1">W</button>

<button id = "S" type="button" class = "buttom1">S</button>

<button id = "D" type="button" class = "buttom1">D</button>



<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
    
    const client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt');

  client.on('connect', () => {
      console.log('Підключено до MQTT брокера!');
  });

  function sendSignal() {
      
      client.publish('ukraine/esp32/Wi-Fi_module', 'toggle');
      console.log("Сигнал надіслано в хмару");
  }

    const button_a = document.getElementById("A");

    button_a.addEventListener("click", sendSignal);

    document.addEventListener("keydown", function(event){
        if (event.repeat) return;

        if(event.key == "A" || event.key == "a"){
            event.preventDefault();
            button_a.style.background = "#ddd";
            sendSignal();

        }


    });



</script>

</body>
</html>
